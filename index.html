<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Of Math - تسجيل الدخول</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- الأساسيات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #1e3a8a, #581c87, #831843);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* خلفية Matrix الرياضية */
        #mathCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .main-container {
            position: relative; z-index: 10; display: flex;
            flex-direction: row; max-width: 1100px; width: 95%;
            align-items: center; gap: 40px; padding: 20px;
        }

        /* --- قسم الترحيب --- */
        .info-section { flex: 1.5; color: white; text-align: right; }
        .brand-name {
            background: linear-gradient(to right, #facc15, #fb923c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800; font-size: clamp(2.5rem, 6vw, 4rem);
        }
        .description { font-size: 1.3rem; color: #fb923c; margin: 20px 0 35px; font-weight: bold; line-height: 1.6; }
        .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .feature-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15); transition: 0.3s;
        }
        .feature-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.2); }

        /* --- بطاقة تسجيل الدخول --- */
        .login-card {
            flex: 1; background: white; padding: 45px; border-radius: 30px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
            min-width: 380px; width: 100%; position: relative;
        }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-img {
            width: 90px; height: 90px; border-radius: 22px;
            margin: 0 auto 15px; display: block;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        /* رسالة التنبيه (الدفع أولاً) */
        .alert-box {
            background: linear-gradient(to right, #fff7ed, #ffedd5);
            border: 1px solid #fb923c; color: #9a3412;
            padding: 15px; border-radius: 15px; margin-bottom: 25px;
            display: none; align-items: center; gap: 12px; font-weight: 800;
            font-size: 0.95rem; border-right: 5px solid #f97316;
        }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; color: #374151; font-weight: 600; font-size: 0.9rem; }
        
        .input-wrapper { position: relative; }
        .input-wrapper input {
            width: 100%; padding: 15px 45px 15px 15px; border: 2px solid #f3f4f6;
            border-radius: 16px; outline: none; transition: 0.3s; font-size: 1rem; background: #f9fafb;
        }
        .input-wrapper input:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .input-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; filter: grayscale(1); }

        /* القائمة المنسدلة المخصصة */
        .custom-select {
            width: 100%; padding: 15px; border: 2px solid #f3f4f6;
            border-radius: 16px; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; background: #f9fafb;
            transition: 0.3s;
        }
        .custom-select:hover { border-color: #e5e7eb; }

        .dropdown-panel {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            border-radius: 18px; margin-top: 10px; box-shadow: 0 25px 35px -5px rgba(0,0,0,0.25);
            z-index: 100; border: 1px solid #e5e7eb; display: none; overflow: hidden;
        }
        .search-box { padding: 12px; border-bottom: 1px solid #f3f4f6; }
        .search-box input {
            width: 100%; padding: 10px; background: #f9fafb;
            border: 1px solid #e5e7eb; border-radius: 12px; outline: none;
        }
        .options-list { max-height: 220px; overflow-y: auto; }
        .option-item {
            padding: 14px 18px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; font-size: 0.95rem; color: #4b5563;
        }
        .option-item:hover { background: #f3f4f6; color: #1f2937; }
        .option-item.selected { background: #eff6ff; color: #2563eb; font-weight: bold; }

        /* زر الإرسال */
        .submit-btn {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        .submit-btn:disabled { background: #d1d5db; cursor: not-allowed; box-shadow: none; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }

        .spinner {
            width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 992px) {
            .main-container { flex-direction: column; text-align: center; padding-top: 40px; }
            .info-section { order: 1; }
            .login-card { order: 2; min-width: 100%; padding: 30px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <canvas id="mathCanvas"></canvas>

    <div class="main-container">
        <div class="info-section">
            <h1>مرحباً في <br> <span class="brand-name">Power Of Math</span></h1>
            <p class="description">سجل دخولك لتبدأ رحلة التحدي والتعلم وتطوير قدراتك الحسابية في مستويات صممت خصيصاً لك.</p>
            <div class="features-grid">
                <div class="feature-card"><span>🎯</span><div class="label">تحديات ممتعة</div></div>
                <div class="feature-card"><span>📊</span><div class="label">تتبع التقدم</div></div>
                <div class="feature-card"><span>👥</span><div class="label">منافسة الأصدقاء</div></div>
            </div>
        </div>

        <div class="login-card">
            <div class="logo-container">
                <img src="favicon.png" alt="Logo" class="logo-img">
                <h2>تسجيل الدخول</h2>
                <p style="color: #6b7280; font-size: 0.9rem; margin-top: 5px;">أهلاً بك في منصة القوة الرياضية</p>
            </div>

            <div id="paymentAlert" class="alert-box">
                <span>⚠️</span> 
                <span id="alertText">يجب عليك الدفع أولاً للوصول إلى ميزات الموقع كاملة.</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>اسم الطالب</label>
                    <div class="input-wrapper">
                        <input type="text" id="studentName" placeholder="أدخل اسمك بالكامل..." required>
                        <span class="input-icon">👤</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>الفرع التعليمي</label>
                    <div class="custom-select" id="selectTrigger">
                        <span id="selectedLabel" style="color: #9ca3af;">اختر الفرع...</span>
                        <span id="arrow">▼</span>
                    </div>
                    
                    <div class="dropdown-panel" id="dropdownPanel">
                        <div class="search-box">
                            <input type="text" id="branchSearch" placeholder="🔍 ابحث عن فرعك...">
                        </div>
                        <div class="options-list" id="optionsList">
                            </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn" disabled>
                    <div class="spinner" id="btnSpinner"></div>
                    <span id="btnText">ابدأ التدريب الآن</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // 1. بيانات الفروع
        const branches = [
            { id: 1, name: "فرع القاهرة - مدينة نصر" },
            { id: 2, name: "فرع الإسكندرية - لوران" },
            { id: 3, name: "فرع المنصورة الرئيسي" },
            { id: 4, name: "فرع الجيزة - أكتوبر" },
            { id: 5, name: "الدراسة عبر الإنترنت (Zoom)" }
        ];

        let selectedId = null;

        // 2. إدارة القائمة المنسدلة
        const trigger = document.getElementById('selectTrigger');
        const panel = document.getElementById('dropdownPanel');
        const searchInput = document.getElementById('branchSearch');
        const optionsList = document.getElementById('optionsList');
        const selectedLabel = document.getElementById('selectedLabel');
        const nameInput = document.getElementById('studentName');
        const submitBtn = document.getElementById('submitBtn');

        function renderOptions(filter = "") {
            optionsList.innerHTML = "";
            const filtered = branches.filter(b => b.name.includes(filter));
            
            filtered.forEach(branch => {
                const item = document.createElement('div');
                item.className = `option-item ${selectedId === branch.id ? 'selected' : ''}`;
                item.innerHTML = `<span>${branch.name}</span> ${selectedId === branch.id ? '<span>✓</span>' : ''}`;
                item.onclick = () => {
                    selectedId = branch.id;
                    selectedLabel.innerText = branch.name;
                    selectedLabel.style.color = "#1f2937";
                    panel.style.display = 'none';
                    checkValidation();
                    renderOptions();
                };
                optionsList.appendChild(item);
            });
            if(filtered.length === 0) optionsList.innerHTML = '<div style="padding:15px; color:#999; text-align:center;">لا يوجد نتائج</div>';
        }

        trigger.onclick = (e) => {
            e.stopPropagation();
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            if(panel.style.display === 'block') searchInput.focus();
        };

        searchInput.oninput = (e) => renderOptions(e.target.value);
        document.onclick = () => panel.style.display = 'none';

        function checkValidation() {
            const isNameValid = nameInput.value.trim().length >= 3;
            const isBranchValid = selectedId !== null;
            submitBtn.disabled = !(isNameValid && isBranchValid);
        }

        nameInput.oninput = checkValidation;

        // 3. معالجة الإرسال (رسالة الدفع)
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const paymentAlert = document.getElementById('paymentAlert');

            submitBtn.disabled = true;
            btnSpinner.style.display = 'block';
            btnText.innerText = 'جارٍ التحقق...';
            paymentAlert.style.display = 'none';

            setTimeout(() => {
                btnSpinner.style.display = 'none';
                btnText.innerText = 'ابدأ التدريب الآن';
                submitBtn.disabled = false;
                paymentAlert.style.display = 'flex';
            }, 1800);
        };

        // 4. خلفية الماتريكس الرياضية
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        const chars = "0123456789+-=x÷√π∞";
        let width, height, columns, drops;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 18);
            drops = Array(columns).fill(0);
        }

        function draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#af604c'; 
            ctx.font = '16px monospace';
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * 18, drops[i] * 18);
                if (drops[i] * 18 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        window.onresize = initCanvas;
        initCanvas();
        setInterval(draw, 50);
        renderOptions();
    </script>
</body>
</html>
